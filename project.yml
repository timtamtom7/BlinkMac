name: Blink
options:
  bundleIdPrefix: com.blink
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"

targets:
  Blink:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blink.ios
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ENABLE_PREVIEWS: YES
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: UIKit.framework
      - sdk: SwiftUI.framework
      - sdk: AVKit.framework
      - sdk: Vision.framework
      - sdk: CoreImage.framework
      - sdk: Photos.framework
