name: Blink
options:
  bundleIdPrefix: com.blink
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"

targets:
  Blink:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blink.macos
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: AppKit.framework
      - sdk: SwiftUI.framework
      - sdk: AVKit.framework
      - sdk: Vision.framework
      - sdk: CoreImage.framework
